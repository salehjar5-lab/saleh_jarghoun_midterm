name: Build Android Exam Project

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create directories
        run: |
          mkdir -p salehjarghoun_130121038/app/src/main/java/com/exam/android2
          mkdir -p salehjarghoun_130121038/app/src/main/res/layout
          mkdir -p salehjarghoun_130121038/app/src/main/res/menu
          mkdir -p salehjarghoun_130121038/app/src/main/res/values
          mkdir -p salehjarghoun_130121038/app/src/main/res/drawable
          mkdir -p salehjarghoun_130121038/app/src/main/res/mipmap-hdpi
          mkdir -p salehjarghoun_130121038/app/src/main/res/mipmap-mdpi
          mkdir -p salehjarghoun_130121038/app/src/main/res/mipmap-xhdpi
          mkdir -p salehjarghoun_130121038/app/src/main/res/mipmap-xxhdpi
          mkdir -p salehjarghoun_130121038/app/src/main/res/mipmap-xxxhdpi
          mkdir -p salehjarghoun_130121038/gradle/wrapper

      - name: Write gradle.properties
        run: |
          echo 'YW5kcm9pZC51c2VBbmRyb2lkWD10cnVlCmFuZHJvaWQuZW5hYmxlSmV0aWZpZXI9dHJ1ZQpvcmcuZ3JhZGxlLmp2bWFyZ3M9LVhteDIwNDhtIC1EZmlsZS5lbmNvZGluZz1VVEYtOAo=' | base64 -d > salehjarghoun_130121038/gradle.properties

      - name: Write settings.gradle
        run: |
          echo '' | base64 -d > salehjarghoun_130121038/settings.gradle

      - name: Write build.gradle
        run: |
          echo 'cGx1Z2lucyB7CiAgICBpZCAnY29tLmFuZHJvaWQuYXBwbGljYXRpb24nIHZlcnNpb24gJzguMi4yJyBhcHBseSBmYWxzZQp9Cg==' | base64 -d > salehjarghoun_130121038/build.gradle

      - name: Write gradle-wrapper.properties
        run: |
          echo 'ZGlzdHJpYnV0aW9uQmFzZT1HUkFETEVfVVNFUl9IT01FCmRpc3RyaWJ1dGlvblBhdGg9d3JhcHBlci9kaXN0cwpkaXN0cmlidXRpb25Vcmw9aHR0cHNcOi8vc2VydmljZXMuZ3JhZGxlLm9yZy9kaXN0cmlidXRpb25zL2dyYWRsZS04LjQtYmluLnppcAp6aXBTdG9yZUJhc2U9R1JBRExFX1VTRVJfSE9NRQp6aXBTdG9yZVBhdGg9d3JhcHBlci9kaXN0cwo=' | base64 -d > salehjarghoun_130121038/gradle/wrapper/gradle-wrapper.properties

      - name: Write build.gradle
        run: |
          echo '' | base64 -d > salehjarghoun_130121038/app/build.gradle

      - name: Write proguard-rules.pro
        run: |
          echo 'IyBQcm9HdWFyZCBydWxlcwo=' | base64 -d > salehjarghoun_130121038/app/proguard-rules.pro

      - name: Write AndroidManifest.xml
        run: |
          echo '' | base64 -d > salehjarghoun_130121038/app/src/main/AndroidManifest.xml

      - name: Write strings.xml
        run: |
          echo '' | base64 -d > salehjarghoun_130121038/app/src/main/res/values/strings.xml

      - name: Write themes.xml
        run: |
          echo '' | base64 -d > salehjarghoun_130121038/app/src/main/res/values/themes.xml

      - name: Write colors.xml
        run: |
          echo '' | base64 -d > salehjarghoun_130121038/app/src/main/res/values/colors.xml

      - name: Write popup_menu.xml
        run: |
          echo '' | base64 -d > salehjarghoun_130121038/app/src/main/res/menu/popup_menu.xml

      - name: Write activity_main.xml
        run: |
          echo '' | base64 -d > salehjarghoun_130121038/app/src/main/res/layout/activity_main.xml

      - name: Write activity_mode.xml
        run: |
          echo '' | base64 -d > salehjarghoun_130121038/app/src/main/res/layout/activity_mode.xml

      - name: Write fragment_tab.xml
        run: |
          echo '' | base64 -d > salehjarghoun_130121038/app/src/main/res/layout/fragment_tab.xml

      - name: Write MainActivity.java
        run: |
          echo '' | base64 -d > salehjarghoun_130121038/app/src/main/java/com/exam/android2/MainActivity.java

      - name: Write ModeActivity.java
        run: |
          echo '' | base64 -d > salehjarghoun_130121038/app/src/main/java/com/exam/android2/ModeActivity.java

      - name: Write TabPagerAdapter.java
        run: |
          echo '' | base64 -d > salehjarghoun_130121038/app/src/main/java/com/exam/android2/TabPagerAdapter.java

      - name: Write TabFragment.java
        run: |
          echo '' | base64 -d > salehjarghoun_130121038/app/src/main/java/com/exam/android2/TabFragment.java

      - name: Create launcher icons
        run: |
          echo '' | base64 -d | python3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Generate Gradle Wrapper
        run: |
          cd salehjarghoun_130121038
          gradle wrapper --gradle-version 8.4 --distribution-type bin
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd salehjarghoun_130121038
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: salehjarghoun_130121038-debug-apk
          path: salehjarghoun_130121038/app/build/outputs/apk/debug/app-debug.apk

      - name: Commit project files to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add salehjarghoun_130121038/
          git diff --cached --quiet || git commit -m "chore: add project files for salehjarghoun_130121038"
          git push

